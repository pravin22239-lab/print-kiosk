<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Flash ink — Print Queue</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  :root{ --paper:#FAF7F0; --ink:#1A1A1A; --accent:#C4432B; --muted:#8A8477; --success:#2F6844; --line:rgba(26,26,26,0.14); }
  *{box-sizing:border-box;}
  body{ margin:0; background:var(--paper); color:var(--ink); font-family:'Inter',sans-serif; padding:28px 16px 60px; }
  h1{ font-family:'JetBrains Mono',monospace; font-size:20px; margin:0 0 4px; text-align:center; }
  .sub{ text-align:center; color:var(--muted); font-size:13px; margin-bottom:24px; font-family:'JetBrains Mono',monospace; }
  .list{ max-width:640px; margin:0 auto; display:flex; flex-direction:column; gap:12px; }
  .job{ background:#fff; border:1.5px solid var(--ink); padding:16px; display:flex; justify-content:space-between; align-items:center; gap:12px; }
  .job.done{ opacity:.45; }
  .job-info{ font-family:'JetBrains Mono',monospace; font-size:13px; line-height:1.6; }
  .job-info .fname{ font-weight:700; font-size:14px; }
  .price{ font-weight:700; color:var(--accent); }
  button{
    font-family:'JetBrains Mono',monospace; font-weight:700; font-size:12px;
    border:1.5px solid var(--ink); background:var(--ink); color:var(--paper);
    padding:10px 14px; cursor:pointer; white-space:nowrap;
  }
  button:disabled{ background:var(--muted); border-color:var(--muted); cursor:default; }
  .empty{ text-align:center; color:var(--muted); font-family:'JetBrains Mono',monospace; margin-top:60px; }
  a.dl{ font-size:12px; color:var(--muted); text-decoration:underline; }
</style>
</head>
<body>
  <h1>Print Queue</h1>
  <div class="sub">Auto-refreshes every 3s</div>
  <div class="list" id="list"></div>

<script>
async function refresh(){
  const res = await fetch('/api/queue');
  const jobs = await res.json();
  const list = document.getElementById('list');

  if(jobs.length === 0){
    list.innerHTML = '<div class="empty">No print jobs yet — paid orders appear here.</div>';
    return;
  }

  list.innerHTML = jobs.map(j => `
    <div class="job ${j.printed ? 'done' : ''}">
      <div class="job-info">
        <div class="fname">${j.filename}</div>
        <div>${j.options.pages}p × ${j.options.copies} · ${j.options.color === 'color' ? 'Color' : 'B&W'} · ${j.options.sides} · ${j.options.paperSize}</div>
        <div class="price">₹${j.price}</div>
        <a class="dl" href="/uploads/${j.fileId}" target="_blank">Open file →</a>
      </div>
      <button ${j.printed ? 'disabled' : ''} onclick="markPrinted('${j.id}')">
        ${j.printed ? '✓ Printed' : 'Mark printed'}
      </button>
    </div>
  `).join('');
}

async function markPrinted(id){
  await fetch('/api/queue/' + id + '/printed', { method:'POST' });
  refresh();
}

refresh();
setInterval(refresh, 3000);
</script>
</body>
</html>
