<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Flash ink — Your Print Order</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://checkout.razorpay.com/v1/checkout.js"></script>
<style>
  :root{
    --paper:#FAF7F0;
    --ink:#1A1A1A;
    --accent:#C4432B;
    --muted:#8A8477;
    --success:#2F6844;
    --line: rgba(26,26,26,0.16);
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background: var(--ink);
    font-family:'Inter',sans-serif;
    color:var(--ink);
    min-height:100vh;
    padding: 24px 16px 60px;
  }
  .receipt{
    max-width:420px;
    margin:0 auto;
    background:var(--paper);
    padding:28px 22px 30px;
    position:relative;
  }
  .receipt::before, .receipt::after{
    content:"";
    position:absolute; left:0; right:0; height:14px;
    background: radial-gradient(circle at 10px 7px, var(--ink) 7px, transparent 8px) repeat-x;
    background-size: 20px 14px;
  }
  .receipt::before{ top:-7px; }
  .receipt::after{ bottom:-7px; transform:rotate(180deg); }

  .eyebrow{
    font-family:'JetBrains Mono',monospace;
    font-size:11px; letter-spacing:.18em; text-transform:uppercase;
    color:var(--muted); text-align:center; margin-bottom:4px;
  }
  h1{ font-family:'JetBrains Mono',monospace; font-size:20px; text-align:center; margin:0 0 20px; }

  .field{ margin-bottom:18px; }
  label{ display:block; font-size:13px; font-weight:600; margin-bottom:6px; }
  .sub{ font-size:12px; color:var(--muted); margin-top:3px; }

  .dropzone{
    border:2px dashed var(--line);
    padding:22px 14px;
    text-align:center;
    cursor:pointer;
    font-family:'JetBrains Mono',monospace;
    font-size:13px;
    color:var(--muted);
    transition: border-color .15s, color .15s;
  }
  .dropzone.filled{ border-color: var(--success); color: var(--success); font-weight:600; }
  .dropzone input{ display:none; }

  .row{ display:flex; gap:10px; }
  .row .field{ flex:1; }

  select, input[type=number]{
    width:100%;
    padding:10px 12px;
    border:1.5px solid var(--ink);
    background:#fff;
    font-family:'Inter',sans-serif;
    font-size:14px;
    border-radius:0;
  }

  .toggle-group{ display:flex; gap:8px; }
  .toggle{
    flex:1;
    border:1.5px solid var(--ink);
    padding:10px 8px;
    text-align:center;
    font-size:13px;
    font-weight:600;
    cursor:pointer;
    user-select:none;
  }
  .toggle.active{ background:var(--ink); color:var(--paper); }

  .line-items{
    border-top:1px dashed var(--line);
    margin-top:22px;
    padding-top:14px;
    font-family:'JetBrains Mono',monospace;
    font-size:13px;
  }
  .line-item{ display:flex; justify-content:space-between; padding:4px 0; color:var(--muted); }
  .line-item.total{
    color:var(--ink); font-weight:700; font-size:16px;
    border-top:1px dashed var(--line); margin-top:8px; padding-top:10px;
  }

  button.pay{
    width:100%;
    margin-top:22px;
    padding:16px;
    background:var(--accent);
    color:#fff;
    border:none;
    font-family:'JetBrains Mono',monospace;
    font-size:15px;
    font-weight:700;
    letter-spacing:.02em;
    cursor:pointer;
  }
  button.pay:disabled{ background:var(--muted); cursor:not-allowed; }

  .msg{ text-align:center; font-size:13px; margin-top:14px; font-family:'JetBrains Mono',monospace; }
  .msg.error{ color:var(--accent); }
  .msg.success{ color:var(--success); font-weight:700; }
</style>
</head>
<body>
  <div class="receipt">
    <div class="eyebrow">Flash ink</div>
    <h1>Build your print order</h1>

    <div class="field">
      <label>1. Upload file</label>
      <div class="dropzone" id="dropzone">
        <input type="file" id="fileInput" accept=".pdf,.jpg,.jpeg,.png,.doc,.docx" />
        <span id="dropzoneText">Tap to choose a PDF, image, or Word file</span>
      </div>
    </div>

    <div class="field">
      <label>2. Color</label>
      <div class="toggle-group">
        <div class="toggle active" data-group="color" data-value="bw">Black &amp; White</div>
        <div class="toggle" data-group="color" data-value="color">Color</div>
      </div>
    </div>

    <div class="field">
      <label>3. Sides</label>
      <div class="toggle-group">
        <div class="toggle active" data-group="sides" data-value="single">Single-sided</div>
        <div class="toggle" data-group="sides" data-value="double">Double-sided</div>
      </div>
    </div>

    <div class="row">
      <div class="field">
        <label>Pages <span class="sub" id="pagesHint" style="display:inline"></span></label>
        <input type="number" id="pages" min="1" value="1" />
      </div>
      <div class="field">
        <label>Copies</label>
        <input type="number" id="copies" min="1" value="1" />
      </div>
      <div class="field">
        <label>Paper</label>
        <select id="paperSize">
          <option>A4</option>
          <option>A5</option>
          <option>Letter</option>
          <option>Legal</option>
        </select>
      </div>
    </div>

    <div class="line-items" id="lineItems">
      <div class="line-item"><span>Rate per copy</span><span id="rateLine">—</span></div>
      <div class="line-item"><span>Copies</span><span id="qtyLine">—</span></div>
      <div class="line-item total"><span>Total</span><span id="totalLine">₹0</span></div>
    </div>

    <button class="pay" id="payBtn" disabled>Upload a file to continue</button>
    <div class="msg" id="msg"></div>
  </div>

<script>
(async () => {
  const params = new URLSearchParams(window.location.search);
  let sessionId = params.get('session');

  // No session in the URL (e.g. a static/printed QR that points straight at
  // order.html) — create a fresh one automatically so this page works as a
  // single fixed link for every customer, not just from a live kiosk screen.
  if(!sessionId){
    try {
      const res = await fetch('/api/session', { method: 'POST' });
      const data = await res.json();
      if(!res.ok || !data.sessionId) throw new Error(data.error || 'Could not start order');
      sessionId = data.sessionId;
    } catch (err) {
      document.body.innerHTML = '<p style="color:#FAF7F0;text-align:center;margin-top:40px;font-family:sans-serif;">Could not start a new order. Please refresh and try again.</p>';
      return;
    }
  }

  let selections = { color:'bw', sides:'single' };
  let rates = { bw:2, color:5 };
  let fileUploaded = false;

  document.querySelectorAll('.toggle').forEach(t => {
    t.addEventListener('click', () => {
      const group = t.dataset.group;
      document.querySelectorAll(`.toggle[data-group="${group}"]`).forEach(x => x.classList.remove('active'));
      t.classList.add('active');
      selections[group] = t.dataset.value;
      updateQuote();
    });
  });
  document.getElementById('pages').addEventListener('input', updateQuote);
  document.getElementById('copies').addEventListener('input', updateQuote);

  const dropzone = document.getElementById('dropzone');
  const fileInput = document.getElementById('fileInput');
  dropzone.addEventListener('click', () => fileInput.click());
  fileInput.addEventListener('change', async () => {
    if(!fileInput.files.length) return;
    const file = fileInput.files[0];
    const fd = new FormData();
    fd.append('file', file);

    document.getElementById('dropzoneText').textContent = 'Uploading ' + file.name + '...';
    try{
      const res = await fetch('/api/upload/' + sessionId, { method:'POST', body: fd });
      const data = await res.json();
      if(!res.ok) throw new Error(data.error || 'Upload failed');
      fileUploaded = true;
      dropzone.classList.add('filled');
      document.getElementById('dropzoneText').textContent = '✓ ' + data.filename;
      document.getElementById('payBtn').disabled = false;
      document.getElementById('payBtn').textContent = 'Pay & print';

      if (data.pages) {
        document.getElementById('pages').value = data.pages;
        document.getElementById('pagesHint').textContent = '(auto-detected, edit if wrong)';
      }

      updateQuote();
    }catch(err){
      showMsg(err.message, 'error');
      document.getElementById('dropzoneText').textContent = 'Tap to choose a PDF, image, or Word file';
    }
  });

  async function loadRates(){
    try{
      const res = await fetch('/api/rates');
      rates = await res.json();
      updateQuote();
    }catch(e){}
  }

  async function updateQuote(){
    const pages = document.getElementById('pages').value;
    const copies = document.getElementById('copies').value;
    const paperSize = document.getElementById('paperSize').value;

    document.getElementById('rateLine').textContent =
      '₹' + (selections.color === 'color' ? rates.color : rates.bw) + ' / copy';
    document.getElementById('qtyLine').textContent = copies;

    if(!fileUploaded) return;

    try{
      const res = await fetch('/api/quote/' + sessionId, {
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body: JSON.stringify({ pages, copies, paperSize, color: selections.color, sides: selections.sides })
      });
      const data = await res.json();
      document.getElementById('totalLine').textContent = '₹' + data.price;
    }catch(e){}
  }

  function showMsg(text, type){
    const el = document.getElementById('msg');
    el.textContent = text;
    el.className = 'msg ' + type;
  }

  document.getElementById('payBtn').addEventListener('click', async () => {
    const btn = document.getElementById('payBtn');
    btn.disabled = true;
    btn.textContent = 'Preparing payment...';
    showMsg('', '');

    try{
      const orderRes = await fetch('/api/pay/create-order/' + sessionId, { method:'POST' });
      const order = await orderRes.json();
      if(!orderRes.ok) throw new Error(order.error || 'Could not start payment');

      const rzp = new Razorpay({
        key: order.keyId,
        amount: order.amount,
        currency: order.currency,
        order_id: order.orderId,
        name: 'Flash ink Kiosk',
        description: 'Print job payment',
        method: { upi: true, card: true, netbanking: true },
        handler: async function (response) {
          const verifyRes = await fetch('/api/pay/verify/' + sessionId, {
            method:'POST',
            headers:{'Content-Type':'application/json'},
            body: JSON.stringify(response)
          });
          const verifyData = await verifyRes.json();
          if(verifyRes.ok){
            showMsg('✓ Paid! Your document is being sent to print.', 'success');
            btn.textContent = 'Paid ✓';
          } else {
            showMsg('Payment verification failed. Please try again.', 'error');
            btn.disabled = false;
            btn.textContent = 'Pay & print';
          }
        },
        modal: {
          ondismiss: function(){
            btn.disabled = false;
            btn.textContent = 'Pay & print';
          }
        },
        theme: { color: '#C4432B' }
      });
      rzp.on('payment.failed', function(){
        showMsg('Payment failed. Please try again.', 'error');
        btn.disabled = false;
        btn.textContent = 'Pay & print';
      });
      rzp.open();
      btn.textContent = 'Pay & print';
    }catch(err){
      showMsg(err.message, 'error');
      btn.disabled = false;
      btn.textContent = 'Pay & print';
    }
  });

  loadRates();
})();
</script>
</body>
</html>
