<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Flash ink — Scan to Print</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#FAF7F0;
    --ink:#1A1A1A;
    --accent:#C4432B;
    --muted:#8A8477;
    --success:#2F6844;
    --line: rgba(26,26,26,0.14);
  }
  *{box-sizing:border-box;}
  html,body{
    margin:0; height:100%;
    background: var(--ink);
    font-family:'Inter',sans-serif;
    color:var(--ink);
    overflow:hidden;
  }
  .stage{
    height:100%;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:40px;
  }
  .ticket{
    background:var(--paper);
    width:min(480px, 90vw);
    padding:48px 40px 40px;
    position:relative;
    box-shadow: 0 30px 80px rgba(0,0,0,0.45);
    animation: rise .6s cubic-bezier(.2,.8,.2,1);
  }
  @keyframes rise{
    from{ transform: translateY(24px); opacity:0; }
    to{ transform: translateY(0); opacity:1; }
  }
  .ticket::before, .ticket::after{
    content:"";
    position:absolute;
    left:0; right:0;
    height:16px;
    background:
      radial-gradient(circle at 12px 8px, var(--ink) 8px, transparent 9px) repeat-x;
    background-size: 24px 16px;
  }
  .ticket::before{ top:-8px; }
  .ticket::after{ bottom:-8px; transform: rotate(180deg); }

  .eyebrow{
    font-family:'JetBrains Mono', monospace;
    font-size:12px;
    letter-spacing:.18em;
    text-transform:uppercase;
    color:var(--muted);
    text-align:center;
    margin-bottom:6px;
  }
  h1{
    font-family:'JetBrains Mono', monospace;
    font-size:26px;
    text-align:center;
    margin:0 0 28px;
    letter-spacing:-0.01em;
  }
  .qr-wrap{
    border: 2px solid var(--ink);
    padding:16px;
    display:flex;
    align-items:center;
    justify-content:center;
    background:#fff;
    margin: 0 auto 24px;
    width:fit-content;
  }
  .qr-wrap img{ display:block; width:260px; height:260px; }

  .steps{
    font-family:'JetBrains Mono', monospace;
    font-size:13px;
    color:var(--ink);
    border-top: 1px dashed var(--line);
    padding-top:20px;
    display:grid;
    gap:10px;
  }
  .steps div{ display:flex; gap:10px; }
  .steps span.num{ color:var(--accent); font-weight:700; }

  .status-line{
    margin-top:24px;
    text-align:center;
    font-family:'JetBrains Mono', monospace;
    font-size:13px;
    color:var(--muted);
    min-height:18px;
  }
  .status-line.active{ color: var(--success); font-weight:700; }

  .total-strip{
    margin-top: 20px;
    border-top: 1px dashed var(--line);
    padding-top:16px;
    display:flex;
    justify-content:space-between;
    font-family:'JetBrains Mono', monospace;
    font-size:12px;
    color: var(--muted);
  }
</style>
</head>
<body>
  <div class="stage">
    <div class="ticket">
      <div class="eyebrow">Flash ink Kiosk</div>
      <h1>Scan → Print → Go</h1>

      <div class="qr-wrap" id="qrWrap">
        <div style="width:260px;height:260px;display:flex;align-items:center;justify-content:center;color:#999;font-family:'JetBrains Mono',monospace;font-size:12px;">
          loading QR...
        </div>
      </div>

      <div class="steps">
        <div><span class="num">01</span> Scan this code with your phone camera</div>
        <div><span class="num">02</span> Upload your file &amp; choose print options</div>
        <div><span class="num">03</span> Pay by UPI — printing starts automatically</div>
      </div>

      <div class="status-line" id="statusLine">Waiting for a customer to scan...</div>

      <div class="total-strip">
        <span id="sessionTag">SESSION —</span>
        <span id="clock">--:--:--</span>
      </div>
    </div>
  </div>

<script>
  let currentSession = null;
  let pollTimer = null;

  function tickClock(){
    document.getElementById('clock').textContent = new Date().toLocaleTimeString('en-IN', { hour12:false });
  }
  setInterval(tickClock, 1000);
  tickClock();

  async function newSession(){
    clearInterval(pollTimer);
    document.getElementById('statusLine').textContent = 'Waiting for a customer to scan...';
    document.getElementById('statusLine').classList.remove('active');

    const res = await fetch('/api/session', { method:'POST' });
    const data = await res.json();
    currentSession = data.sessionId;
    document.getElementById('sessionTag').textContent = 'SESSION ' + currentSession.toUpperCase();
    document.getElementById('qrWrap').innerHTML = `<img src="${data.qr}" alt="Scan to print QR code" />`;

    pollTimer = setInterval(pollStatus, 2000);
  }

  async function pollStatus(){
    if(!currentSession) return;
    try{
      const res = await fetch('/api/session/' + currentSession);
      if(!res.ok) return;
      const s = await res.json();
      const line = document.getElementById('statusLine');

      if(s.status === 'waiting_for_upload'){
        line.textContent = 'Waiting for a customer to scan...';
        line.classList.remove('active');
      } else if(s.status === 'awaiting_payment'){
        line.textContent = 'File received — customer is choosing options & paying';
        line.classList.remove('active');
      } else if(s.status === 'paid'){
        line.textContent = '✓ Payment received — sending to printer...';
        line.classList.add('active');
      } else if(s.status === 'printed'){
        line.textContent = '✓ Printed! Starting a new session...';
        line.classList.add('active');
        setTimeout(newSession, 3000);
      }
    }catch(e){ /* ignore transient errors */ }
  }

  newSession();
</script>
</body>
</html>
